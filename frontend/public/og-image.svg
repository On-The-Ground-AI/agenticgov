    d="M18.5 2L6 18h8l-2 12 12.5-16H16.5l2-12z"
  />

  <!-- Title -->
  <text x="350" y="280" font-family="system-ui, -apple-system, sans-serif" font-size="72" font-weight="600" fill="#1e293b">Causalis</text>

  <!-- Subtitle -->
