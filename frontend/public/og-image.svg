  <!-- Description -->
  <text x="350" y="440" font-family="system-ui, -apple-system, sans-serif" font-size="24" fill="#64748b">Make every evaluation decision</text>
  <text x="350" y="480" font-family="system-ui, -apple-system, sans-serif" font-size="24" fill="#64748b">defensible, transparent, and fast.</text>
