<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="AgenticGov — Making Agentic AI Work for Government">
  <defs>
    <!-- Rich saturated background gradient: deep navy → indigo → violet with gold warmth -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0B1224"/>
      <stop offset="40%" stop-color="#141E3C"/>
      <stop offset="75%" stop-color="#2A1E54"/>
      <stop offset="100%" stop-color="#3A1F4A"/>
    </linearGradient>

    <!-- Gold radial glow (top-left, soft) -->
    <radialGradient id="goldGlow" cx="18%" cy="22%" r="55%">
      <stop offset="0%" stop-color="#D4A843" stop-opacity="0.45"/>
      <stop offset="55%" stop-color="#B8860B" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#B8860B" stop-opacity="0"/>
    </radialGradient>

    <!-- Violet radial glow (bottom-right) -->
    <radialGradient id="violetGlow" cx="85%" cy="92%" r="60%">
      <stop offset="0%" stop-color="#7C3AED" stop-opacity="0.40"/>
      <stop offset="60%" stop-color="#4F46E5" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#4F46E5" stop-opacity="0"/>
    </radialGradient>

    <!-- Gold wordmark gradient -->
    <linearGradient id="goldText" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E9C46A"/>
      <stop offset="50%" stop-color="#D4A843"/>
      <stop offset="100%" stop-color="#B8860B"/>
    </linearGradient>

    <!-- Soft blur for glassmorphism backdrop -->
    <filter id="glassBlur" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="18"/>
    </filter>

    <!-- Subtle dot grid pattern -->
    <pattern id="dots" x="0" y="0" width="32" height="32" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="1" fill="#FFFFFF" fill-opacity="0.05"/>
    </pattern>
  </defs>

  <!-- Background stack -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#dots)"/>
  <rect width="1200" height="630" fill="url(#goldGlow)"/>
  <rect width="1200" height="630" fill="url(#violetGlow)"/>

  <!-- Decorative blurred orbs (glassmorphism atmospherics) -->
  <g filter="url(#glassBlur)" opacity="0.55">
    <circle cx="980" cy="120" r="90" fill="#D4A843" fill-opacity="0.35"/>
    <circle cx="180" cy="520" r="120" fill="#7C3AED" fill-opacity="0.30"/>
    <circle cx="640" cy="340" r="60" fill="#4F46E5" fill-opacity="0.25"/>
  </g>

  <!-- Frosted glass card containing the wordmark -->
  <g>
    <rect x="72" y="96" width="1056" height="320" rx="28" ry="28"
          fill="#FFFFFF" fill-opacity="0.04"
          stroke="#FFFFFF" stroke-opacity="0.12" stroke-width="1"/>
    <!-- Inner highlight stroke for premium feel -->
    <rect x="73" y="97" width="1054" height="318" rx="27" ry="27"
          fill="none"
          stroke="#D4A843" stroke-opacity="0.18" stroke-width="0.5"/>
  </g>

  <!-- Eyebrow tag -->
  <g transform="translate(112, 142)">
    <rect x="0" y="0" width="208" height="32" rx="16" ry="16"
          fill="#B8860B" fill-opacity="0.14"
          stroke="#D4A843" stroke-opacity="0.55" stroke-width="1"/>
    <circle cx="18" cy="16" r="4" fill="#D4A843"/>
    <text x="32" y="21" font-family="Inter, -apple-system, &quot;Segoe UI&quot;, sans-serif"
          font-size="13" font-weight="600" letter-spacing="2.4" fill="#E9C46A">
      VISUAL DEMO · LIVE
    </text>
  </g>

  <!-- Wordmark: AgenticGov -->
  <text x="112" y="270"
        font-family="Inter, -apple-system, &quot;Segoe UI&quot;, sans-serif"
        font-size="116" font-weight="800" letter-spacing="-3"
        fill="url(#goldText)">AgenticGov</text>

  <!-- Tagline -->
  <text x="116" y="328"
        font-family="Inter, -apple-system, &quot;Segoe UI&quot;, sans-serif"
        font-size="34" font-weight="600" letter-spacing="-0.5" fill="#F8FAFC">
    Making Agentic AI Work for Government
  </text>

  <!-- Subtitle -->
  <text x="116" y="372"
        font-family="Inter, -apple-system, &quot;Segoe UI&quot;, sans-serif"
        font-size="22" font-weight="400" fill="#CBD5E1">
    A visual companion to the WEF Readiness Framework
  </text>

  <!-- Sub-app pill grid (6 apps, 3 columns × 2 rows) -->
  <!-- Row 1 -->
  <g transform="translate(112, 446)">
    <!-- Mission Control · slate -->
    <g>
      <rect width="304" height="56" rx="14" ry="14"
            fill="#FFFFFF" fill-opacity="0.05"
            stroke="#94A3B8" stroke-opacity="0.45" stroke-width="1"/>
      <circle cx="22" cy="28" r="6" fill="#94A3B8"/>
      <text x="42" y="33" font-family="Inter, -apple-system, &quot;Segoe UI&quot;, sans-serif"
            font-size="18" font-weight="600" fill="#F1F5F9">Mission Control</text>
    </g>
    <!-- TenderAI · amber -->
    <g transform="translate(320, 0)">
      <rect width="304" height="56" rx="14" ry="14"
            fill="#FFFFFF" fill-opacity="0.05"
            stroke="#D97706" stroke-opacity="0.55" stroke-width="1"/>
      <circle cx="22" cy="28" r="6" fill="#D97706"/>
      <text x="42" y="33" font-family="Inter, -apple-system, &quot;Segoe UI&quot;, sans-serif"
            font-size="18" font-weight="600" fill="#F1F5F9">TenderAI</text>
    </g>
    <!-- FiscalAI · blue -->
    <g transform="translate(640, 0)">
      <rect width="304" height="56" rx="14" ry="14"
            fill="#FFFFFF" fill-opacity="0.05"
            stroke="#2563EB" stroke-opacity="0.55" stroke-width="1"/>
      <circle cx="22" cy="28" r="6" fill="#2563EB"/>
      <text x="42" y="33" font-family="Inter, -apple-system, &quot;Segoe UI&quot;, sans-serif"
            font-size="18" font-weight="600" fill="#F1F5F9">FiscalAI</text>
    </g>
  </g>

  <!-- Row 2 -->
  <g transform="translate(112, 514)">
    <!-- ReadinessMap · violet -->
    <g>
      <rect width="304" height="56" rx="14" ry="14"
            fill="#FFFFFF" fill-opacity="0.05"
            stroke="#7C3AED" stroke-opacity="0.55" stroke-width="1"/>
      <circle cx="22" cy="28" r="6" fill="#7C3AED"/>
      <text x="42" y="33" font-family="Inter, -apple-system, &quot;Segoe UI&quot;, sans-serif"
            font-size="18" font-weight="600" fill="#F1F5F9">ReadinessMap</text>
    </g>
    <!-- GovBench · cyan -->
    <g transform="translate(320, 0)">
      <rect width="304" height="56" rx="14" ry="14"
            fill="#FFFFFF" fill-opacity="0.05"
            stroke="#0891B2" stroke-opacity="0.55" stroke-width="1"/>
      <circle cx="22" cy="28" r="6" fill="#0891B2"/>
      <text x="42" y="33" font-family="Inter, -apple-system, &quot;Segoe UI&quot;, sans-serif"
            font-size="18" font-weight="600" fill="#F1F5F9">GovBench</text>
    </g>
    <!-- TransparencyAI · red -->
    <g transform="translate(640, 0)">
      <rect width="304" height="56" rx="14" ry="14"
            fill="#FFFFFF" fill-opacity="0.05"
            stroke="#DC2626" stroke-opacity="0.55" stroke-width="1"/>
      <circle cx="22" cy="28" r="6" fill="#DC2626"/>
      <text x="42" y="33" font-family="Inter, -apple-system, &quot;Segoe UI&quot;, sans-serif"
            font-size="18" font-weight="600" fill="#F1F5F9">TransparencyAI</text>
    </g>
  </g>

  <!-- Right-side audience strip: all seven jurisdictions, alphabetical -->
  <g transform="translate(1054, 96)">
    <rect x="-12" y="-8" width="56" height="362" rx="20" ry="20"
          fill="#FFFFFF" fill-opacity="0.04"
          stroke="#FFFFFF" stroke-opacity="0.12" stroke-width="1"/>
    <!-- CN -->
    <g transform="translate(0, 4)">
      <circle cx="16" cy="16" r="14" fill="#EF4444" fill-opacity="0.18" stroke="#EF4444" stroke-opacity="0.6" stroke-width="1"/>
      <text x="16" y="21" text-anchor="middle"
            font-family="Inter, -apple-system, &quot;Segoe UI&quot;, sans-serif"
            font-size="11" font-weight="700" fill="#FCA5A5">CN</text>
    </g>
    <!-- IN -->
    <g transform="translate(0, 52)">
      <circle cx="16" cy="16" r="14" fill="#F59E0B" fill-opacity="0.18" stroke="#F59E0B" stroke-opacity="0.6" stroke-width="1"/>
      <text x="16" y="21" text-anchor="middle"
            font-family="Inter, -apple-system, &quot;Segoe UI&quot;, sans-serif"
            font-size="11" font-weight="700" fill="#FCD34D">IN</text>
    </g>
    <!-- JP -->
    <g transform="translate(0, 100)">
      <circle cx="16" cy="16" r="14" fill="#EC4899" fill-opacity="0.18" stroke="#EC4899" stroke-opacity="0.6" stroke-width="1"/>
      <text x="16" y="21" text-anchor="middle"
            font-family="Inter, -apple-system, &quot;Segoe UI&quot;, sans-serif"
            font-size="11" font-weight="700" fill="#F9A8D4">JP</text>
    </g>
    <!-- PK -->
    <g transform="translate(0, 148)">
      <circle cx="16" cy="16" r="14" fill="#22C55E" fill-opacity="0.18" stroke="#22C55E" stroke-opacity="0.6" stroke-width="1"/>
      <text x="16" y="21" text-anchor="middle"
            font-family="Inter, -apple-system, &quot;Segoe UI&quot;, sans-serif"
            font-size="11" font-weight="700" fill="#86EFAC">PK</text>
    </g>
    <!-- SG -->
    <g transform="translate(0, 196)">
      <circle cx="16" cy="16" r="14" fill="#DC2626" fill-opacity="0.22" stroke="#DC2626" stroke-opacity="0.65" stroke-width="1"/>
      <text x="16" y="21" text-anchor="middle"
            font-family="Inter, -apple-system, &quot;Segoe UI&quot;, sans-serif"
            font-size="11" font-weight="700" fill="#FECACA">SG</text>
    </g>
    <!-- AE -->
    <g transform="translate(0, 244)">
      <circle cx="16" cy="16" r="14" fill="#10B981" fill-opacity="0.18" stroke="#10B981" stroke-opacity="0.6" stroke-width="1"/>
      <text x="16" y="21" text-anchor="middle"
            font-family="Inter, -apple-system, &quot;Segoe UI&quot;, sans-serif"
            font-size="11" font-weight="700" fill="#6EE7B7">AE</text>
    </g>
    <!-- US -->
    <g transform="translate(0, 292)">
      <circle cx="16" cy="16" r="14" fill="#3B82F6" fill-opacity="0.18" stroke="#3B82F6" stroke-opacity="0.6" stroke-width="1"/>
      <text x="16" y="21" text-anchor="middle"
            font-family="Inter, -apple-system, &quot;Segoe UI&quot;, sans-serif"
            font-size="11" font-weight="700" fill="#93C5FD">US</text>
    </g>
  </g>

  <!-- Footer line -->
  <g transform="translate(112, 596)">
    <text font-family="Inter, -apple-system, &quot;Segoe UI&quot;, sans-serif"
          font-size="14" font-weight="500" letter-spacing="0.6" fill="#94A3B8">
      WEF Readiness Framework  ·  Visual Demo  ·  No login required
    </text>
  </g>

  <!-- Bottom-right brand mark -->
  <g transform="translate(1018, 588)">
    <text text-anchor="end"
          font-family="Inter, -apple-system, &quot;Segoe UI&quot;, sans-serif"
          font-size="13" font-weight="500" letter-spacing="2" fill="#D4A843" fill-opacity="0.85">
      ON THE GROUND
    </text>
  </g>
</svg>
